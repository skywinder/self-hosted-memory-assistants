# Override for chronicle/backends/advanced/docker-compose.yml
# Remaps ports to 90xx range and adds shared memory-net network
# Usage: docker compose -f chronicle/backends/advanced/docker-compose.yml -f overrides/chronicle.override.yml up -d

services:
  chronicle-backend:
    ports:
      - "9000:8000"
    environment:
      - CORS_ORIGINS=http://localhost:9010,http://localhost:9000
    networks:
      - default
      - memory-net

  workers:
    networks:
      - default
      - memory-net

  webui:
    ports:
      - "9010:80"
    networks:
      - default
      - memory-net

  caddy:
    ports:
      - "9443:443"
      - "9080:80"
      - "9343:3443"

  mongo:
    ports:
      - "27018:27017"

  redis:
    ports:
      - "6380:6379"

  neo4j:
    ports:
      - "7475:7474"
      - "7688:7687"

networks:
  memory-net:
    name: memory-net
    external: true
