# Override for ushadow/compose/docker-compose.infra.yml
# Remaps infrastructure ports to 80xx range and adds shared memory-net network
# Usage: docker compose -f ushadow/compose/docker-compose.infra.yml -f overrides/ushadow-infra.override.yml --profile infra up -d

services:
  mongo:
    ports: !override
      - "27020:27017"
    networks:
      - ushadow-network
      - infra-network
      - memory-net

  redis:
    ports: !override
      - "6382:6379"
    networks:
      - ushadow-network
      - infra-network
      - memory-net

  qdrant:
    ports: !override
      - "6335:6333"
      - "6336:6334"
    networks:
      - ushadow-network
      - infra-network
      - memory-net

  neo4j:
    ports: !override
      - "7476:7474"
      - "7689:7687"
    networks:
      - ushadow-network
      - infra-network
      - memory-net

  keycloak:
    ports: !override
      - "8081:8080"
      - "8082:9000"      # management port, remapped from 9000 to avoid chronicle conflict

networks:
  memory-net:
    name: memory-net
    external: true
